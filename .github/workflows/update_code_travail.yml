name: Check Code du travail corpus

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  check-corpus:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore corpus cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw
            data/metadata
          key: code-travail-corpus-${{ github.run_id }}
          restore-keys: |
            code-travail-corpus-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check remote corpus
        run: python src/download_code_travail.py

      - name: Save corpus cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw
            data/metadata
          key: code-travail-corpus-${{ github.run_id }}
